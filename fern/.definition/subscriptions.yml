imports:
  root: __package__.yml
types:
  CancelSubscriptionRequestEntityMode:
    docs: >-
      The mode of cancellation (immediate or scheduled), default can be
      configured in the store billing settings.
    enum:
      - immediate
      - scheduled
    inline: true
    source:
      openapi: definition/openapi/creem-openapi.json
  CancelSubscriptionRequestEntityOnExecute:
    docs: >-
      The action to execute when canceling (cancel or pause) when mode is
      scheduled, ignored when mode is immediate or not provided
    enum:
      - cancel
      - pause
    inline: true
    source:
      openapi: definition/openapi/creem-openapi.json
  UpdateSubscriptionRequestEntityUpdateBehavior:
    default: proration-charge
    docs: The update behavior for the subscription (defaults to proration)
    enum:
      - name: ProrationChargeImmediately
        value: proration-charge-immediately
      - name: ProrationCharge
        value: proration-charge
      - name: ProrationNone
        value: proration-none
    inline: true
    source:
      openapi: definition/openapi/creem-openapi.json
  UpgradeSubscriptionRequestEntityUpdateBehavior:
    default: proration-charge-immediately
    docs: >-
      The update behavior for the subscription (defaults to
      proration-charge-immediately)
    enum:
      - name: ProrationChargeImmediately
        value: proration-charge-immediately
      - name: ProrationCharge
        value: proration-charge
      - name: ProrationNone
        value: proration-none
    inline: true
    source:
      openapi: definition/openapi/creem-openapi.json

name: quality

on:
    push:
        branches:
            - '**'
        tags-ignore:
            - 'v*'
    pull_request:

jobs:
    quality:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                php-version:
                    - '8.4'
                    - '8.5'

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Download actionlint
              if: matrix.php-version == '8.4'
              id: actionlint
              run: bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.11/scripts/download-actionlint.bash) 1.7.11
              shell: bash

            - name: Lint GitHub Actions workflows
              if: matrix.php-version == '8.4'
              run: ${{ steps.actionlint.outputs.executable }} -color
              shell: bash

            - name: Set up PHP ${{ matrix.php-version }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Run QA verification
              run: composer qa:check

            - name: Run dependency advisory audit
              run: composer audit --locked

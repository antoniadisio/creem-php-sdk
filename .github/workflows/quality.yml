name: quality

on:
    push:
    pull_request:

jobs:
    quality:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up PHP 8.1
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.1'

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Run PHPUnit
              run: composer test

            - name: Run Pint
              run: composer cs

            - name: Run PHPStan
              run: composer stan
